version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Puedes sobreescribir aquí si quieres:
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: sqlite:///./data/ecommerce_chat.db
      ENVIRONMENT: development
    volumes:
      # Persistencia de la BD
      - ./data:/app/data
      # Monta el código para desarrollo (hot-reload)
      - .:/app
    command: uvicorn src.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:

networks:
  app-network: